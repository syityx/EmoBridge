server.port=8081

# ── Chroma 向量数据库配置（通过环境变量注入，支持 Docker/K8s 部署） ────────────────
# 注意：host 需要包含协议前缀 http:// 或 https://
spring.ai.vectorstore.chroma.client.host=${CHROMA_HOST:http://localhost}
spring.ai.vectorstore.chroma.client.port=${CHROMA_PORT:8000}
spring.ai.vectorstore.chroma.collection-name=${CHROMA_COLLECTION_NAME:emobridge_docs}
# 禁止启动时自动建表（集合由 Python 知识入库脚本负责创建）
spring.ai.vectorstore.chroma.initialize-schema=false

# ── OpenAI 兼容嵌入模型配置（用于 rag_search 工具向量化查询词） ─────────────────────
spring.ai.openai.api-key=${OPENAI_API_KEY:placeholder}
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://api.siliconflow.cn/v1}
spring.ai.openai.embedding.options.model=${EMBEDDING_MODEL_NAME:Qwen/Qwen3-Embedding-8B}
# 禁用 Chat 模型自动装配（MCP Server 只需要 Embedding，不需要 ChatModel）
spring.ai.openai.chat.enabled=false
